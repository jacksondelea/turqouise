<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/images/FAVICON Small.png" type="image/x-icon">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <p style="color: white">Loading...</p>
    </div>
    <div id="main-content" style="display: none;">
        <div class="scroll-wrapper">
            <div class="sticky-logo">
                <a href="index.html" class="logo">Turquoise</a>
            </div>
            <div class="current-container">
             <!-- Left side -->
                <div class="left-container">
                    <div class="image-container">
                        <img src="images/pigeons.jpg" alt="Landing Image" class="header-img">
                    </div>
                    <hr style="color: black; width: 40px; margin-top: 12px; margin-left: 0px;">

                    <img src="images/1.jpg" class="exhibition-img" style="margin-top: 0px;">
                    <img src="images/2.jpg" class="exhibition-img">
                    <img src="images/3.jpg" class="exhibition-img">
                    <img src="images/4.jpg" class="exhibition-img">
                    <img src="images/5.jpg" class="exhibition-img">
                    <img src="images/6.jpg" class="exhibition-img">
                    <img src="images/7.jpg" class="exhibition-img">
                    <img src="images/8.jpg" class="exhibition-img">
                    <img src="images/9.jpg" class="exhibition-img">
                    <img src="images/10.jpg" class="exhibition-img">
                    <img src="images/11.jpg" class="exhibition-img">
                    <img src="images/12.jpg" class="exhibition-img">
                    <img src="images/13.jpg" class="exhibition-img">
                    <img src="images/14.jpg" class="exhibition-img"> 
                    <img src="images/15.jpg" class="exhibition-img">
                    <img src="images/16.jpg" class="exhibition-img">
                    <img src="images/17.jpg" class="exhibition-img">
                    <img src="images/18.jpg" class="exhibition-img">
                    <img src="images/19.jpg" class="exhibition-img">
                    <img src="images/20.jpg" class="exhibition-img">
                </div>
                <div class="right-container">
                    <div>
                        <div style="font-style: italic;">Literature</div>
                        <div>Organized with Keren Cytter</div>
                        <div>May 15 - June 14, 2026</div>
                        <a class="toggle-text underline" href="images/Literature PR.pdf" target="_blank">Press Release + Checklist</a>  
                        <div><a class="toggle-text underline" href="images/frieze shows to see.jpg" target="_blank">Frieze</a></div>                     
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll("img");
            let loadedCount = 0;
            const totalImages = images.length;

            images.forEach(img => {
                if (img.complete) {
                    incrementCounter();
                } else {
                    img.addEventListener("load", incrementCounter);
                    img.addEventListener("error", incrementCounter);
                }
            });

            function incrementCounter() {
                loadedCount++;
                if (loadedCount === totalImages) {
                    document.getElementById("loading-screen").style.display = "none";
                    document.getElementById("main-content").style.display = "block";
                }
            }
        });
    </script>
</body>
</html>
