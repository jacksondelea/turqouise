<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/images/FAVICON Small.png" type="image/x-icon">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <p style="color: white">Loading...</p>
    </div>
    <div id="main-content" style="display: none;">
        <div class="scroll-wrapper">
            <div class="sticky-logo">
                <a href="index.html" class="logo">Turquoise</a>
            </div>
            <div class="current-container">
             <!-- Left side -->
                <div class="left-container">
                    <div class="image-container">
                        <img src="images/IMG_7573.jpg" alt="Landing Image" class="header-img">
                    </div>
                    <hr style="color: black; width: 40px; margin-top: 12px; margin-left: 0px;">

                    <img src="images/1 S.jpg" class="exhibition-img" style="margin-top: 0px;">
                    <img src="images/2 S.jpg" class="exhibition-img">
                    <img src="images/3 S.jpg" class="exhibition-img">
                    <img src="images/4 S.jpg" class="exhibition-img">
                    <img src="images/5 S.jpg" class="exhibition-img">
                    <img src="images/6 S.jpg" class="exhibition-img">
                    <img src="images/7 S.jpg" class="exhibition-img">
                    <img src="images/8 S.jpg" class="exhibition-img">
                    <img src="images/9 S.jpg" class="exhibition-img">
                    <img src="images/10 S.jpg" class="exhibition-img">
                    <img src="images/11 S.jpg" class="exhibition-img">
                    <img src="images/12 S.jpg" class="exhibition-img">
                    <img src="images/13 S.jpg" class="exhibition-img">
                    <img src="images/14 S.jpg" class="exhibition-img"> 
                    <img src="images/15 S.jpg" class="exhibition-img">
                    <img src="images/16 S.jpg" class="exhibition-img">
                    <img src="images/17 S.jpg" class="exhibition-img">
                    <img src="images/18 S.jpg" class="exhibition-img">
                    <img src="images/19.jpg" class="exhibition-img">
                    <img src="images/20 S.jpg" class="exhibition-img">
                    <img src="images/21 S.jpg" class="exhibition-img">
                    <img src="images/22 S.jpg" class="exhibition-img">
                    <img src="images/23 S.jpg" class="exhibition-img">
                    <img src="images/24 S.jpg" class="exhibition-img">
                    <img src="images/25 S.jpg" class="exhibition-img">
                </div>
                <div class="right-container">
                    <div>
                        <div style="font-style: italic;">Who's Afraid of ____ ?</div>
                        <div>In collaboration with Hans Goodrich, Chicago</div>
                        <div>March 27 - May 10, 2026</div>
                        <a class="toggle-text underline" href="images/PR + Checklist Package.pdf" target="_blank">Press Release + Checklist</a>  
                        <div><a class="toggle-text underline" href="images/“The Manhattan Art Review” 4_11_26.pdf" target="_blank">Kritic's Korner</a></div>                     
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll("img");
            let loadedCount = 0;
            const totalImages = images.length;

            images.forEach(img => {
                if (img.complete) {
                    incrementCounter();
                } else {
                    img.addEventListener("load", incrementCounter);
                    img.addEventListener("error", incrementCounter);
                }
            });

            function incrementCounter() {
                loadedCount++;
                if (loadedCount === totalImages) {
                    document.getElementById("loading-screen").style.display = "none";
                    document.getElementById("main-content").style.display = "block";
                }
            }
        });
    </script>
</body>
</html>
